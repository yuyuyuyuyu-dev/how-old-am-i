name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  formatting:
    name: Check Formatting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup build
        uses: ./.github/actions/setup-build
      - name: Run Spotless
        run: ./gradlew spotlessCheck
      - name: Check version catalog formatting
        # The format task has no check-only mode, so we format and treat any
        # resulting diff as proof the committed catalog was not formatted.
        run: |
          ./gradlew versionCatalogFormat
          git diff --exit-code gradle/libs.versions.toml

  linting:
    name: Static Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup build
        uses: ./.github/actions/setup-build
      - name: Run Detekt
        run: ./gradlew detekt

  actionlint:
    name: Lint Workflows
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup build
        uses: ./.github/actions/setup-build
      - name: Run Tests
        run: ./gradlew allTests

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # Runs the exact same build as the deploy job (see .github/actions/build-distribution)
      # so a broken production build is caught on the pull request, not after merging to main.
      - name: Build distribution
        uses: ./.github/actions/build-distribution
